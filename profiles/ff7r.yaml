name: ff7r
description: |
  Final Fantasy VII Remake / Intergrade — UE4，DX12。
  KB+M 配置：WASD 跑动 + 鼠标视角 + 鼠标左键攻击 + Space 闪避 + E 互动。
  FF7R 的 cinematic 模式很常见，watchdog 触发率会偏高 — 正常现象。
  推荐 driver=hybrid（keep_alive 主跑 + VLM 只在静帧 12s 时介入解卡，
  既便宜又能处理菜单/卡位等复杂场景）。

controls:
  move_forward: W
  move_back: S
  move_left: A
  move_right: D
  turn_axis: mouse
  attack: mouse_left
  interact: E
  jump: SPACE             # FF7R 不支持跳，但 keep_alive sequence 不调用
  dismiss_ui: M           # FF7R 退 UI 用 M（不是 ESC，ESC 会打开系统菜单）

reserved_keys: [F8, F9]

input:
  prefer_gamepad: false
  mouse_sensitivity: 0.8

keep_alive:
  period_s: 1.0
  # 节奏设计原则（撞墙是 keep_alive 最大的死循环源）：
  # - forward 占比 ≤ 35%（旧版 52% 经常连冲 2-3 段把 Cloud 钉墙上）
  # - 每个移动段后强制接一次 turn，避免连续同向 W 冲进死胡同
  # - 大幅 turn (magnitude 2.0-2.5 → 单次 mouse pulse 480-600px ≈ 65-80°
  #   视角，mouse_sensitivity=0.8) 让撞墙后一次就能扭开正前障碍物
  # - strafe (left/right) 拉到 1.0s — 配合 turn 后的 forward 形成弧线探索
  # - move_back × 2 段：撞墙时多一条退路，对称分布在周期前后
  # NOTE: 之前版本曾插入 "M heartbeat" 让盲 bot 主动 dismiss tutorial popup —
  # 已移除。M 在 FF7R 不是 idempotent：在 gameplay 里按 M 会打开 map screen，
  # 然后下一次 M 不一定可靠回到 gameplay（有时落到子 tab）。dismiss_ui 只
  # 留在 `recovery`（watchdog 确认 UI lockup 后才触发），不在主循环里。
  sequence:
    # 第一波：短前进 → 大幅转向 → 侧移 → 转向 → 再短前进 → 攻击
    - {action: move_forward, duration_ms: 1200}
    - {action: turn,         duration_ms: 400, payload: {direction: random, magnitude: 2.0}}
    - {action: move_left,    duration_ms: 1000}
    - {action: turn,         duration_ms: 400, payload: {direction: random, magnitude: 1.5}}
    - {action: move_forward, duration_ms: 1000}
    - {action: attack,       duration_ms: 250}
    # 第二波：超大转向 + 后退脱潜在卡位 + 反向探索
    - {action: turn,         duration_ms: 500, payload: {direction: random, magnitude: 2.5}}
    - {action: move_back,    duration_ms: 1200}
    - {action: turn,         duration_ms: 400, payload: {direction: random, magnitude: 2.0}}
    - {action: move_right,   duration_ms: 1000}
    - {action: move_forward, duration_ms: 1000}
    - {action: interact,     duration_ms: 200}
    # 第三波：再来一次转向 + 短侧移 + 短前进 + 短后退收尾
    - {action: turn,         duration_ms: 400, payload: {direction: random, magnitude: 1.8}}
    - {action: move_left,    duration_ms: 800}
    - {action: turn,         duration_ms: 400, payload: {direction: random, magnitude: 1.8}}
    - {action: move_forward, duration_ms: 800}
    - {action: attack,       duration_ms: 250}
    - {action: move_back,    duration_ms: 800}
    - {action: wait,         duration_ms: 400}
  recovery:
    # 关键认识：watchdog 触发时 bot 大概率还在 *gameplay 中卡墙/卡角*（最常见场景），
    # 不是进了菜单。OCR 臂已独立处理菜单/popup（explicit dismiss-prompt + generic
    # menu phrase → 直接注入对应 key），所以 recovery 专攻 gameplay-stuck，不需要
    # 先 ESC 退菜单。
    #
    # 旧版踩过两个坑（已修）：
    # 1. 头部 ESC × 3：FF7R gameplay 里 ESC 是 *打开* main menu，连按 3 次 = 开/关
    #    /开三次菜单，后续所有 movement 全被菜单吞掉根本到不了角色身上 → 看起来
    #    "watchdog 触发了但 bot 仍卡墙"。彻底移除。
    # 2. 4 连 turn 之间没 wait：keep_alive.py mouse turn 是 duration_ms=0 的瞬时
    #    SendInput pulse，4 次在 < 1ms 内全发完，游戏一帧合并 mouse delta → 实际
    #    只转 1 次 (~60°)。修法：每次 turn 后插 80ms wait 让游戏每帧 sample 一次
    #    delta，4 次累积 ≈ 200°+ 真调头。

    # 1) 立刻拉开贴墙距离
    - {action: move_back, duration_ms: 2000}

    # 2) 4 连 turn 大幅调头（每次之间插 wait 让游戏 sample mouse delta；
    #    每次 magnitude 2.5 = dx 600px @ sens 0.8，4 次累积约 200°+）
    - {action: turn, payload: {direction: left, magnitude: 2.5}}
    - {action: wait, duration_ms: 80}
    - {action: turn, payload: {direction: left, magnitude: 2.5}}
    - {action: wait, duration_ms: 80}
    - {action: turn, payload: {direction: left, magnitude: 2.5}}
    - {action: wait, duration_ms: 80}
    - {action: turn, payload: {direction: left, magnitude: 2.5}}
    - {action: wait, duration_ms: 200}

    # 3) 调头后试探前进 1.5s
    - {action: move_forward, duration_ms: 1500}

    # 4) 还卡 → 反向 + 横移找绕路（下一轮 watchdog 还会再触发整个 recovery）
    - {action: turn, payload: {direction: right, magnitude: 2.5}}
    - {action: wait, duration_ms: 80}
    - {action: turn, payload: {direction: right, magnitude: 2.5}}
    - {action: wait, duration_ms: 80}
    - {action: move_left,    duration_ms: 1200}
    - {action: move_forward, duration_ms: 1500}

    # NOTE: recovery 100% 纯 movement —— 末尾不按任何 menu 相关键
    # (无 ESC, 无 M, 无 ENTER, 无 Tab, 无 Backspace)。
    #
    # 历史教训（按时间顺序）：
    # 1) 曾经头部 `ESC × 3` 作"退菜单"兜底 → 实测 ESC 在 gameplay 中 *打开*
    #    Main Menu，连按 3 次 = 开/关/开三次，后面所有 movement 全被菜单
    #    吞掉。已删除。
    # 2) 改成末尾"单次 ESC + M"兜底 → 仍然在 gameplay 误触发开菜单。已删除。
    # 3) 再缩成末尾仅 `dismiss_ui (M)` → 实测 M 在 gameplay 中**打开 Map
    #    副屏**！VLM 看到 map (dark panel + 视觉特征跟 Main Menu 类似) 输出
    #    M 试图关闭，但 FF7R 的 Map 退出键是 Tab 不是 M → 陷入死循环 4 分钟
    #    (log 19:09:48 → 19:11:52)。
    #
    # 教训：watchdog 误触发是常态 (local-only 静帧 / UI-mask 假阳性等)，
    # recovery 必须假定 "bot 还在 gameplay 中" 跑，绝不能主动按任何会触发
    # 菜单/UI/photo-mode 的键。物理脱困靠 movement (S + 4 连 turn + W) 已
    # 经够用；如果 bot 真的进了菜单，让 main loop 的 VLM 看图决策处理。

watchdog:
  sample_period_s: 2.0           # short-window=10s (5×2), long-window=4s (2×2)
  static_diff_threshold: 0.003   # 阈值收紧：VLM 思考时画面 diff ~0.002
  consecutive_static_required: 5 # 10s 才触发，减少 normal gameplay 误触发率
                                 # (4 → 5：误触发开菜单的连锁灾难比"晚 2s
                                 # 触发真正的卡死"代价大得多)
