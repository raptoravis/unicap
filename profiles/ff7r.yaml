name: ff7r
description: |
  Final Fantasy VII Remake / Intergrade — UE4，DX12。
  KB+M 配置：WASD 跑动 + 鼠标视角 + 鼠标左键攻击 + Space 闪避 + E 互动。
  FF7R 的 cinematic 模式很常见，watchdog 触发率会偏高 — 正常现象。

controls:
  move_forward: W
  move_back: S
  move_left: A
  move_right: D
  turn_axis: mouse
  attack: mouse_left
  interact: E
  jump: SPACE             # FF7R 不支持跳，但 keep_alive sequence 不调用

reserved_keys: [F8, F9]

input:
  prefer_gamepad: false
  mouse_sensitivity: 0.8

keep_alive:
  period_s: 1.0
  sequence:
    - {action: move_forward, duration_ms: 2500}
    - {action: turn,         duration_ms: 500, payload: {direction: random, magnitude: 1.2}}
    - {action: move_forward, duration_ms: 1800}
    - {action: attack,       duration_ms: 250}
    - {action: turn,         duration_ms: 600, payload: {direction: random, magnitude: 1.5}}
    - {action: move_left,    duration_ms: 800}
    - {action: move_forward, duration_ms: 1500}
    - {action: interact,     duration_ms: 200}
    - {action: turn,         duration_ms: 700, payload: {direction: random, magnitude: 1.2}}
    - {action: move_right,   duration_ms: 800}
    - {action: move_back,    duration_ms: 1200}      # 防止一直撞墙
    - {action: turn,         duration_ms: 800, payload: {direction: random, magnitude: 1.8}}
    - {action: move_forward, duration_ms: 1500}
    - {action: attack,       duration_ms: 250}
    - {action: wait,         duration_ms: 600}
  recovery:
    # FF7R 卡住时常见原因：1) 误进了菜单/地图/状态界面 — 必须按 M 才能回到 3D 场景
    # 2) cutscene 卡 — ENTER 跳过 3) 撞墙 — 调头 + 后退脱困
    - {action: press_key, payload: {vk: M},     duration_ms: 100}   # FF7R: 退 UI → 3D 场景
    - {action: wait,      duration_ms: 250}
    - {action: press_key, payload: {vk: ENTER}, duration_ms: 100}   # 跳过对话/cutscene
    - {action: wait,      duration_ms: 200}
    - {action: press_key, payload: {vk: ESC},   duration_ms: 100}   # 兜底退菜单
    - {action: press_key, payload: {vk: ESC},   duration_ms: 100}
    # 连续 4 次同向大转向 ≈ 180° 调头（mouse_sensitivity=0.8 → 每次 ~480px dx）
    - {action: turn, duration_ms: 100, payload: {direction: left, magnitude: 2.0}}
    - {action: turn, duration_ms: 100, payload: {direction: left, magnitude: 2.0}}
    - {action: turn, duration_ms: 100, payload: {direction: left, magnitude: 2.0}}
    - {action: turn, duration_ms: 100, payload: {direction: left, magnitude: 2.0}}
    # 调头后后退脱离障碍物
    - {action: move_back,    duration_ms: 1500}
    - {action: turn,         duration_ms: 600, payload: {direction: random, magnitude: 1.5}}
    - {action: move_forward, duration_ms: 2000}

watchdog:
  sample_period_s: 6.0
  static_diff_threshold: 0.008
  consecutive_static_required: 3   # FF7R cutscene 多 — 不要太敏感

vlm:
  game_instructions: |
    Final Fantasy VII Remake (UE4 / DX12). Action-RPG. WASD moves Cloud relative
    to camera. Mouse turns the camera. Left-click is basic attack (combos by
    repeated clicks). E interacts with NPCs/objects. ESC opens menu.
    Goal: explore the current area; engage simple enemies; do NOT enter major
    story choices. If a cutscene or "press X to advance" appears, hit Enter
    to skip. Avoid permanent decisions (don't pick story options).
  frame_subsample_long_edge: 512
