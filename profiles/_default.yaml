name: _default
description: |
  通用 fallback profile — 适用于大多数 FPS / 第三人称 / 动作游戏。
  WASD 移动 + 鼠标视角 + 空格跳 + E 互动 + 鼠标左键攻击。
  接入新游戏时复制本文件改 controls 即可。

controls:
  move_forward: W
  move_back: S
  move_left: A
  move_right: D
  turn_axis: mouse        # mouse | gamepad_rstick
  attack: mouse_left
  interact: E
  jump: SPACE
  dismiss_ui: ESC         # back / close current UI (most games)

reserved_keys: [F8, F9]   # 强制保留：F8/F9=capture start/stop（unicap 自身热键）

input:
  prefer_gamepad: false
  mouse_sensitivity: 1.0

keep_alive:
  period_s: 0.8
  sequence:
    - {action: move_forward, duration_ms: 2200}
    - {action: turn,         duration_ms: 500,  payload: {direction: random, magnitude: 1.0}}
    - {action: move_forward, duration_ms: 1800}
    - {action: interact,     duration_ms: 200}
    - {action: turn,         duration_ms: 700,  payload: {direction: random, magnitude: 1.5}}
    - {action: move_left,    duration_ms: 700}
    - {action: attack,       duration_ms: 250}
    - {action: move_right,   duration_ms: 700}
    - {action: move_back,    duration_ms: 1000}
    - {action: turn,         duration_ms: 800,  payload: {direction: random, magnitude: 1.8}}
    - {action: jump,         duration_ms: 100}
    - {action: move_forward, duration_ms: 1500}
    - {action: wait,         duration_ms: 500}
  recovery:
    - {action: dismiss_ui, duration_ms: 100}
    - {action: wait,       duration_ms: 200}
    - {action: dismiss_ui, duration_ms: 100}
    - {action: press_key,  payload: {vk: SPACE}, duration_ms: 100}
    # 连续 4 次同向大转向 ≈ 180° 调头
    - {action: turn, duration_ms: 100, payload: {direction: left, magnitude: 2.0}}
    - {action: turn, duration_ms: 100, payload: {direction: left, magnitude: 2.0}}
    - {action: turn, duration_ms: 100, payload: {direction: left, magnitude: 2.0}}
    - {action: turn, duration_ms: 100, payload: {direction: left, magnitude: 2.0}}
    - {action: move_back,    duration_ms: 1200}
    - {action: turn,         duration_ms: 600, payload: {direction: random, magnitude: 1.2}}
    - {action: move_forward, duration_ms: 1500}

watchdog:
  sample_period_s: 5.0
  static_diff_threshold: 0.01    # 平均像素 diff（归一化 0-1）
  consecutive_static_required: 2
